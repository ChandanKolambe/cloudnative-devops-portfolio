apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-test
  labels:
    app: postgres-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-test
  template:
    metadata:
      labels:
        app: postgres-test
    spec:
      containers:
      - name: postgres-test
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: portfolio_test_db
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-test-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-test-storage
        emptyDir: {}
