replicaCount: 2

image:
  repository: ghcr.io/chandankolambe/cloudnative-devops-portfolio/app
  tag: "0.20.0"
  pullPolicy: IfNotPresent

serviceAccountName: fastapi-sa

service:
  type: NodePort
  port: 8000
  nodePort: 30080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
